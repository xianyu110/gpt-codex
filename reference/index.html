<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex 速查与安全</title>
  <meta name="description" content="Codex 命令、推荐设置、安全规则和常见问题速查。">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    :root {
      --bg: #120f1d;
      --panel: #221c35;
      --panel-2: #2c2445;
      --text: #f7f3e9;
      --muted: #c8bfdc;
      --cyan: #62f3ff;
      --yellow: #ffd84d;
      --border: #0a0812;
      --grid: rgba(255, 255, 255, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Courier New", "Monaco", monospace;
      color: var(--text);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(180deg, #0d0a15 0%, #120f1d 100%);
      background-size: 24px 24px, 24px 24px, auto;
      line-height: 1.65;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(18, 15, 29, 0.92);
      border-bottom: 4px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }
    .brand { font-weight: 900; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .nav a,
    .button,
    .card {
      border: 4px solid var(--border);
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
    }
    .nav a,
    .button {
      display: inline-flex;
      padding: 8px 12px;
      background: var(--panel-2);
    }
    .button-primary { background: var(--cyan); color: #03131a; }
    .hero { padding: 52px 0 24px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .card { background: var(--panel); padding: 20px; }
    h1 { font-size: clamp(34px, 5vw, 64px); line-height: 1.1; margin: 0 0 16px; }
    h2 { font-size: clamp(24px, 3.6vw, 40px); margin: 0 0 16px; }
    h3 { margin: 0 0 10px; color: var(--yellow); }
    p { margin: 0; color: var(--muted); }
    .lead { color: var(--muted); font-size: 18px; max-width: 760px; }
    .section { padding: 28px 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    @media (max-width: 760px) {
      .grid-2 { grid-template-columns: 1fr; }
      .topbar-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">CODEX 速查</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
        <a href="../docs/">教程目录</a>
        <a href="../recipes/">实战案例</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container card">
        <h1>速查与安全</h1>
        <p class="lead">把最常用命令、推荐设置、安全边界和常见问题放在一页，方便新手边用边查。</p>
        <div class="actions">
          <a class="button button-primary" href="commands.md">命令速查</a>
          <a class="button" href="safety.md">安全规则</a>
          <a class="button" href="faq.md">FAQ</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container grid-2">
        <a class="card" href="commands.md"><h3>命令 / 斜杠速查</h3><p>/plan、/status、git、rg、本地预览。</p></a>
        <a class="card" href="settings.md"><h3>推荐设置</h3><p>推理深度、权限、AGENTS.md 默认规则。</p></a>
        <a class="card" href="safety.md"><h3>避坑与安全</h3><p>密钥、权限、第三方中转和高风险操作。</p></a>
        <a class="card" href="faq.md"><h3>FAQ</h3><p>新手最常问的问题。</p></a>
      </div>
    </section>
  </main>
</body>
</html>
